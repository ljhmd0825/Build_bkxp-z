name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    container:
      # github.repository_owner를 써서 대소문자 및 유저명 문제를 원천 차단합니다.
      image: ghcr.io/${{ github.repository_owner }}/mkxp-z-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Dependencies
        run: |
          cd linux
          # Dockerfile에 이미 빌드 도구(autoconf 2.71 등)가 다 있으니 바로 실행
          make -j$(nproc)

      - name: Main Build (mkxp-z)
        run: |
          # Dockerfile 5번에서 생성한 툴체인 파일 경로 그대로 사용
          meson setup build --cross-file /usr/local/share/aarch64-cross.txt --prefix=$GITHUB_WORKSPACE/dist
          ninja -C build install

      - name: Archive Result
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
