name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      # 사용자님의 빌더 이미지 (확인 완료)
      image: ghcr.io/${{ github.repository_owner }}/mkxpz-builder-64:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # 1. mkxp-z 공식 소스를 'mkxp-z' 폴더로 클론
      - name: Checkout mkxp-z Source
        uses: actions/checkout@v4
        with:
          repository: 'mkxp-z/mkxp-z'
          submodules: recursive
          path: 'mkxp-z'

      # 2. 의존성 빌드 (공식 소스 내부의 linux 폴더로 진입)
      - name: Build Dependencies
        working-directory: ./mkxp-z/linux
        run: |
          make

      # 3. 메인 빌드 (AArch64 크로스 빌드)
      - name: Main Build
        working-directory: ./mkxp-z
        run: |
          rm -rf build
          # 도커파일 5번 단계에서 생성된 툴체인 파일 경로 활용
          meson setup build --cross-file /usr/local/share/aarch64-cross.txt --prefix=$GITHUB_WORKSPACE/dist
          ninja -C build install

      - name: Archive Result
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
