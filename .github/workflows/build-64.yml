name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    container:
      # 주소를 변수 없이 직접 박아서 오타나 파싱 에러를 방지합니다.
      image: ghcr.io/ljhmd0825/mkxp-z-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dependencies
        run: |
          cd linux
          make -j$(nproc)

      - name: Main Build
        run: |
          # 도커파일에 정의된 경로 그대로 호출
          meson setup build --cross-file /usr/local/share/aarch64-cross.txt --prefix=$GITHUB_WORKSPACE/dist
          ninja -C build install

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
