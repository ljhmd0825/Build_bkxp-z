name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/mkxpz-builder-64:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout mkxp-z Source
        uses: actions/checkout@v4
        with:
          repository: 'mkxp-z/mkxp-z'
          submodules: recursive
          path: 'mkxp-z'

      - name: Build Dependencies
        working-directory: ./mkxp-z/linux
        run: |
          # 1. 크로스 컴파일러 설정 (AArch64)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=${CROSS_COMPILE}gcc
          export CXX=${CROSS_COMPILE}g++
          export AR=${CROSS_COMPILE}ar
          export RANLIB=${CROSS_COMPILE}ranlib
          
          # 2. autogen.sh 실패(LT_INIT undefined) 해결을 위한 매크로 경로 주입
          # 시스템의 libtool 매크로를 강제로 참조하게 하여 엉망인 빌드 환경 복구
          export ACLOCAL_PATH="/usr/share/aclocal"

          # 3. 라이브러리 빌드 (이미 서브모듈로 존재하는 소스 활용)
          # ogg 빌드: autogen 단계에서 툴체인 정보가 꼬이지 않도록 autoreconf 강제 실행
          cd ../external/ogg
          autoreconf -vfi
          ./configure --host=aarch64-linux-gnu --prefix=$GITHUB_WORKSPACE/mkxp-z/linux/build --disable-shared
          make install

          # vorbis 빌드: 앞서 빌드된 ogg 경로를 직접 타격
          cd ../vorbis
          mkdir -p cmakebuild && cd cmakebuild
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=${CC} \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/mkxp-z/linux/build \
            -DOGG_LIBRARY=$GITHUB_WORKSPACE/mkxp-z/linux/build/lib/libogg.a \
            -DOGG_INCLUDE_DIR=$GITHUB_WORKSPACE/mkxp-z/linux/build/include \
            -DBUILD_SHARED_LIBS=OFF
          make install

      - name: Main Build
        working-directory: ./mkxp-z
        run: |
          rm -rf build
          # 빌드 결과물이 모인 경로를 PKG_CONFIG에 주입
          export PKG_CONFIG_LIBDIR=$GITHUB_WORKSPACE/mkxp-z/linux/build/lib/pkgconfig
          
          meson setup build \
            --cross-file /usr/local/share/aarch64-cross.txt \
            --prefix=$GITHUB_WORKSPACE/dist \
            -Dlink_static=true
          ninja -C build install

      - name: Archive Result
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
