name: Manual Build

on:
  workflow_dispatch:

jobs:
  build-linux-arm64:
    name: Build for Linux arm64 (Ubuntu 20.04 Base)
    runs-on: ubuntu-22.04
    steps:
      - uses: benjlevesque/short-sha@v2.2
        id: short-sha
        with:
          length: 7

      - name: Checkout repository
        uses: actions/checkout@v5

      - uses: actions/cache@v4
        with:
          path: |
            linux/build-arm64
            linux/downloads
          key: lin-focal-arm64-${{ hashFiles('linux/Makefile', 'linux/target*', 'linux/toolchain*') }}

      - name: Install apt dependencies (Strict Focal arm64)
        run: |
          sudo dpkg --add-architecture arm64
          
          # 1. 소스 리스트 재구성 (호스트 amd64는 Jammy, 타겟 arm64는 Focal)
          sudo tee /etc/apt/sources.list <<EOF
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb [arch=amd64] http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          EOF

          sudo tee /etc/apt/sources.list.d/focal-arm64.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ focal main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ focal-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ focal-security main restricted universe multiverse
          EOF

          sudo apt update

          # 2. 필수 빌드 도구 설치
          sudo apt install git wget build-essential autoconf automake libtool pkg-config ruby bison xxd python3-pip -y
          sudo pip3 install meson ninja

          # 3. 크로스 컴파일러 설치
          sudo apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu -y

          # 4. 타겟 라이브러리 설치 (libc6-dev:arm64를 선두에 배치하여 의존성 해결 강제)
          sudo apt install -y \
            libc6:arm64 \
            libc6-dev:arm64 \
            libexpat1-dev:arm64 \
            zlib1g-dev:arm64 \
            libbz2-dev:arm64 \
            libgl1-mesa-dev:arm64 \
            libasound2-dev:arm64 \
            libpulse-dev:arm64 \
            libx11-dev:arm64 \
            libxext-dev:arm64 \
            libxrender-dev:arm64 \
            libxft-dev:arm64 \
            libxi-dev:arm64 \
            libxrandr-dev:arm64 \
            libxss-dev:arm64 \
            libxtst-dev:arm64 \
            libxcomposite-dev:arm64 \
            libxcursor-dev:arm64 \
            libxdamage-dev:arm64 \
            libxinerama-dev:arm64 \
            libxkbfile-dev:arm64 \
            libxpm-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libfreetype6-dev:arm64 \
            x11proto-dev \
            xtrans-dev
     
      - name: Build everything else
        run: |
          cd linux
          source target-arm64.sh
          make

      - name: Build executable
        run: |
          source linux/target-arm64.sh
          source linux/vars.sh
          meson setup --cross-file linux/$ARCH_MESON_TOOLCHAIN build --bindir=. --prefix=$GITHUB_WORKSPACE/build/local
          cd build
          ninja
          ninja install
          cp "$MKXPZ_PREFIX/lib/$(aarch64-linux-gnu-objdump -p local/mkxp-z* | grep -i NEEDED | grep -Eo 'libruby.so.[0-9\.]+')" local/lib*/ || true
          cp "/usr/lib/aarch64-linux-gnu/$(aarch64-linux-gnu-objdump -p local/lib*/libruby.so* | grep -i NEEDED | grep -Eo 'libcrypt.so.[0-9\.]+')" local/lib*/ || true

      - name: Prepare archive
        run: |
          cd build/local
          cp -r ../../linux/build-arm64/lib/ruby/3.1.0 . || true
          mv ./3.1.0 ./stdlib || true
          cp ../../mkxp.json .
          cp -r ../../scripts .
          cp ../../assets/LICENSE.mkxp-z-with-https.txt .

      - uses: actions/upload-artifact@v4
        with:
          name: mkxp-z.linux.arm64.manual-${{steps.short-sha.outputs.sha}}
          path: build/local
