name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 컨테이너 필드에서 secrets는 직접 호출이 불가능하므로 직접 이미지 주소를 적거나 
    # 아래와 같이 환경 변수를 거쳐야 합니다.
    container:
      image: ghcr.io/${{ github.repository_owner }}/mkxp-z-builder:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dependencies
        run: |
          cd linux
          make -j$(nproc)

      - name: Main Build (mkxp-z)
        run: |
          meson setup build --cross-file /usr/local/share/aarch64-cross.txt --prefix=$GITHUB_WORKSPACE/dist
          ninja -C build install

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
