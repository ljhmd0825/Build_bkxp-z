name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      # 사용자님이 지정하신 정확한 패키지명 'mkxpz-builder-64'를 적용했습니다.
      image: ghcr.io/${{ github.repository_owner }}/mkxpz-builder-64:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Dependencies
        run: |
          cd linux
          # Dockerfile 내부의 autoconf 2.71 환경을 활용
          make -j$(nproc)

      - name: Main Build (mkxp-z)
        run: |
          # Dockerfile 5번 단계에서 생성된 툴체인 파일 경로
          meson setup build --cross-file /usr/local/share/aarch64-cross.txt --prefix=$GITHUB_WORKSPACE/dist
          ninja -C build install

      - name: Archive Result
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
