name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    container:
      # 사용자님이 확인해주신 실제 패키지명
      image: ghcr.io/${{ github.repository_owner }}/mkxpz-builder-64:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Dependencies
        # 컨테이너 환경에서는 상대 경로로 접근하는 것이 가장 안전합니다.
        run: |
          cd linux
          make -j$(nproc)

      - name: Main Build (mkxp-z)
        run: |
          # build 폴더 정리 후 meson 실행
          rm -rf build
          # 도커파일에 박혀있는 툴체인 경로 사용
          meson setup build --cross-file /usr/local/share/aarch64-cross.txt --prefix=$GITHUB_WORKSPACE/dist
          ninja -C build install

      - name: Archive Result
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-arm64
          path: dist/
