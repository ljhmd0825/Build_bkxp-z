name: mkxp-z AArch64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/mkxpz-builder-64:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Source (Include Submodules)
        uses: actions/checkout@v4
        with:
          repository: 'mkxp-z/mkxp-z'
          submodules: recursive # 이미 여기서 모든 소스가 준비됩니다.
          path: 'mkxp-z'

      - name: Build Dependencies (Cross-Compile)
        working-directory: ./mkxp-z/linux
        run: |
          # 1. 크로스 컴파일러 고정
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=${CROSS_COMPILE}gcc
          export CXX=${CROSS_COMPILE}g++
          export AR=${CROSS_COMPILE}ar
          export RANLIB=${CROSS_COMPILE}ranlib
          
          # 2. 타겟 경로 설정 (공식 Makefile의 경로 구조 존중)
          export INSTALL_PREFIX=$GITHUB_WORKSPACE/mkxp-z/linux/build-x86_64
          mkdir -p $INSTALL_PREFIX

          # 3. 별도 다운로드 없이 이미 체크아웃된 서브모듈 경로에서 순차 빌드
          
          # [Ogg 빌드] - 병렬 빌드 금지, 크로스 호스트 명시
          cd downloads/x86_64/ogg
          ./autogen.sh
          ./configure --host=aarch64-linux-gnu --prefix=$INSTALL_PREFIX --disable-shared
          make -j1 install 
          
          # [Vorbis 빌드] - Ogg가 설치된 후에 실행
          cd ../vorbis
          mkdir -p cmakebuild && cd cmakebuild
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=${CC} \
            -DCMAKE_CXX_COMPILER=${CXX} \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX \
            -DOGG_LIBRARY=$INSTALL_PREFIX/lib/libogg.a \
            -DOGG_INCLUDE_DIR=$INSTALL_PREFIX/include \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) install

      - name: Main Build
        working-directory: ./mkxp-z
        run: |
          rm -rf build
          export PKG_CONFIG_LIBDIR=$GITHUB_WORKSPACE/mkxp-z/linux/build-x86_64/lib/pkgconfig
          
          meson setup build \
            --cross-file /usr/local/share/aarch64-cross.txt \
            --prefix=$GITHUB_WORKSPACE/dist \
            -Dlink_static=true
          ninja -C build install

      - name: Archive Result
        uses: actions/upload-artifact@v4
        with:
          name: mkxp-z-aarch64
          path: dist/
